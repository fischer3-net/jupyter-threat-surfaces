# ==============================================================================
# deploy-book.yml — Threat Surfaces | fischer³ Education
#
# Builds the Jupyter Book and deploys to GitHub Pages on every push to main.
# Notebooks are NOT executed during build (execute: off in _config.yml).
# ==============================================================================

name: Deploy Jupyter Book

on:
  push:
    branches:
      - main
    paths:
      - '**.ipynb'
      - '**.md'
      - '_config.yml'
      - '_toc.yml'
      - 'requirements-book.txt'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Jupyter Book and dependencies
        run: pip install -r requirements-book.txt

      - name: Build the book
        run: jupyter-book build . --all

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
